name: Go CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

# The deploy job needs GHCR write access, but only on trusted pushes to main.
# Repository contents stay read-only for this public app repo.

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set Up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Download Modules
        run: go mod download

      - name: Check Formatting
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "The following files are not formatted:"
            echo "$unformatted"
            exit 1
          fi

      - name: GolangCI-Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.1
          args: --timeout=5m ./...

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: livid
          POSTGRES_PASSWORD: livid
          POSTGRES_DB: livid
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U livid -d livid"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      TEST_DATABASE_URL: postgres://livid:livid@localhost:5432/livid?sslmode=disable

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set Up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Download Modules
        run: go mod download

      - name: Build
        run: go build -v ./...

      - name: Test
        run: go test -v ./...

      - name: Race Test DB
        run: go test -race ./db

  coverage:
    runs-on: ubuntu-latest
    needs: test
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: livid
          POSTGRES_PASSWORD: livid
          POSTGRES_DB: livid
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U livid -d livid"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      TEST_DATABASE_URL: postgres://livid:livid@localhost:5432/livid?sslmode=disable

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set Up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Download Modules
        run: go mod download

      - name: Generate Coverage Profile
        run: go test -covermode=atomic -coverpkg=./... -coverprofile=coverage.out ./...

      - name: Generate Coverage Reports
        run: |
          go tool cover -func=coverage.out | tee coverage.txt
          go tool cover -html=coverage.out -o coverage.html
          total=$(awk '/^total:/ {print $3}' coverage.txt)
          {
            echo "## Coverage"
            echo
            echo "Total coverage: \`$total\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Coverage Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: |
            coverage.out
            coverage.txt
            coverage.html

  publish-and-update-gitops:
    name: Publish image and update GitOps
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    env:
      INFRA_REPO: anor-labs/infrastructure
      INFRA_VALUES_FILE: deploy/k8s/apps/livid-bot/chart/values.yaml

    steps:
      - name: Checkout app
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Derive image metadata
        id: image
        run: |
          set -euo pipefail
          owner="$(printf '%s' "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          tag="${GITHUB_SHA::12}"
          echo "repository=ghcr.io/${owner}/livid-bot" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.image.outputs.repository }}:${{ steps.image.outputs.tag }}
            ${{ steps.image.outputs.repository }}:main
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Require infrastructure write token
        env:
          INFRA_REPO_TOKEN: ${{ secrets.INFRA_REPO_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${INFRA_REPO_TOKEN}" ]; then
            echo "::error::Missing INFRA_REPO_TOKEN secret with contents:write access to ${INFRA_REPO}."
            exit 1
          fi

      - name: Checkout infrastructure
        uses: actions/checkout@v7
        with:
          repository: ${{ env.INFRA_REPO }}
          token: ${{ secrets.INFRA_REPO_TOKEN }}
          path: infrastructure

      - name: Update livid-bot image tag in GitOps repo
        id: gitops
        working-directory: infrastructure
        env:
          IMAGE_REPOSITORY: ${{ steps.image.outputs.repository }}
          IMAGE_TAG: ${{ steps.image.outputs.tag }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import os
          from pathlib import Path

          path = Path(os.environ["INFRA_VALUES_FILE"])
          repository = os.environ["IMAGE_REPOSITORY"]
          tag = os.environ["IMAGE_TAG"]
          lines = path.read_text().splitlines()
          in_image = False
          saw_repository = False
          saw_tag = False
          old_tag = ""

          for idx, line in enumerate(lines):
              if line == "image:":
                  in_image = True
                  continue
              if in_image and line and not line.startswith(" "):
                  in_image = False
              if not in_image:
                  continue
              stripped = line.strip()
              if stripped.startswith("repository:"):
                  lines[idx] = f"  repository: {repository}"
                  saw_repository = True
              elif stripped.startswith("tag:"):
                  old_tag = stripped.split(":", 1)[1].strip().strip('"').strip("'")
                  lines[idx] = f'  tag: "{tag}"'
                  saw_tag = True

          if not (saw_repository and saw_tag):
              raise SystemExit(f"failed to update repository/tag in {path}")
          path.write_text("\n".join(lines) + "\n")

          output_path = os.environ.get("GITHUB_OUTPUT")
          if output_path:
              with open(output_path, "a", encoding="utf-8") as output:
                  print(f"old_tag={old_tag}", file=output)
          PY

      - name: Commit and push GitOps image bump
        working-directory: infrastructure
        env:
          IMAGE_TAG: ${{ steps.image.outputs.tag }}
          OLD_IMAGE_TAG: ${{ steps.gitops.outputs.old_tag }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet -- "${INFRA_VALUES_FILE}"; then
            echo "GitOps values already point at ${IMAGE_TAG}; nothing to commit."
            exit 0
          fi

          git diff --check -- "${INFRA_VALUES_FILE}"
          git add "${INFRA_VALUES_FILE}"

          release_notes_file="$(mktemp)"
          app_repo="${GITHUB_WORKSPACE}"

          if [ -n "${OLD_IMAGE_TAG}" ] && git -C "${app_repo}" cat-file -e "${OLD_IMAGE_TAG}^{commit}" 2>/dev/null; then
            git -C "${app_repo}" log --no-merges --pretty=format:'- %s (%h)' "${OLD_IMAGE_TAG}..${GITHUB_SHA}" > "${release_notes_file}"
          else
            {
              echo "- ${GITHUB_SHA::12}: $(git -C "${app_repo}" show -s --format=%s "${GITHUB_SHA}")"
              if [ -n "${OLD_IMAGE_TAG}" ]; then
                echo "- Note: previous deployed tag ${OLD_IMAGE_TAG} was not found in checkout history."
              fi
            } > "${release_notes_file}"
          fi

          if [ ! -s "${release_notes_file}" ]; then
            echo "- No app commits found between ${OLD_IMAGE_TAG:-<unknown>} and ${GITHUB_SHA::12}." > "${release_notes_file}"
          fi

          release_notes_limited="$(head -n 20 "${release_notes_file}")"

          git commit \
            -m "deploy(livid-bot): ${IMAGE_TAG}" \
            -m "Release notes:" \
            -m "${release_notes_limited}" \
            -m "App commit: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/commit/${GITHUB_SHA}"
          git pull --rebase origin main
          git push origin HEAD:main
